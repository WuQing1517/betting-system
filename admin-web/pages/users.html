<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">竞猜管理后台</div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">数据统计</a>
                <a href="users.html" class="nav-item active">用户管理</a>
                <a href="matches.html" class="nav-item">比赛管理</a>
                <a href="questions.html" class="nav-item">问题管理</a>
            </nav>
            <div class="logout" onclick="logout()">退出登录</div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1>用户管理</h1>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>昵称</th>
                            <th>CN</th>
                            <th>币数</th>
                            <th>管理员</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/users.js"></script>
    <script>
        // 检查登录状态
        if (!checkLogin()) {
            // 会自动跳转到登录页
        } else {
            // 加载用户列表
            document.addEventListener('DOMContentLoaded', function() {
                loadUsers();
            });
        }

        function logout() {
            localStorage.removeItem('adminUserId');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

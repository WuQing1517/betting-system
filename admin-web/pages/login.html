<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        
        .login-box {
            background-color: #fff;
            border-radius: 10px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        
        .login-title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .login-btn:hover {
            background-color: #2980b9;
        }
        
        .login-tip {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">竞猜系统管理后台</h1>
            <div class="form-group">
                <label for="adminId">管理员ID</label>
                <input type="text" id="adminId" placeholder="请输入管理员用户ID">
            </div>
            <button class="login-btn" onclick="adminLogin()">登录</button>
            <div class="login-tip">
                提示：需要先在小程序中将用户设为管理员
            </div>
        </div>
    </div>

    <script>
        // 检查是否已登录
        if (localStorage.getItem('adminUserId')) {
            window.location.href = '../index.html';
        }
        
        function adminLogin() {
            const adminId = document.getElementById('adminId').value.trim();
            
            if (!adminId) {
                alert('请输入管理员ID');
                return;
            }
            
            // 验证管理员权限
            fetch(`http://localhost:5000/api/admin/stats`, {
                headers: {
                    'X-User-Id': adminId
                }
            })
            .then(response => {
                if (response.ok) {
                    localStorage.setItem('adminUserId', adminId);
                    window.location.href = '../index.html';
                } else {
                    alert('管理员权限验证失败，请确认ID正确');
                }
            })
            .catch(error => {
                alert('登录失败: ' + error.message);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">竞猜管理后台</div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">数据统计</a>
                <a href="users.html" class="nav-item">用户管理</a>
                <a href="matches.html" class="nav-item active">比赛管理</a>
                <a href="questions.html" class="nav-item">问题管理</a>
            </nav>
            <div class="logout" onclick="logout()">退出登录</div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1>比赛管理</h1>
                <button class="btn btn-primary" onclick="createCompetition()">创建大比赛</button>
            </div>
            
            <!-- 大比赛列表 -->
            <div class="section">
                <h2>大比赛列表</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>年份</th>
                                <th>赛季</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="competitionTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 比赛列表 -->
            <div class="section">
                <h2>比赛列表</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>比赛代码</th>
                                <th>所属比赛</th>
                                <th>周数</th>
                                <th>天数</th>
                                <th>比赛数</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="matchTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/matches.js"></script>
    <script>
        // 检查登录状态
        if (!checkLogin()) {
            // 会自动跳转到登录页
        } else {
            // 加载比赛列表
            document.addEventListener('DOMContentLoaded', function() {
                loadMatches();
            });
        }

        function logout() {
            localStorage.removeItem('adminUserId');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin_V_Q</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="authPage" class="page active">
        <div class="auth-box">
            <h1>Coin_V_Q</h1>
            <div id="loginForm">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="loginUsername" placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn-primary" onclick="login()">登录</button>
                <p class="link" onclick="showRegister()">注册账号</p>
            </div>
            <div id="registerForm" style="display:none">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="regUsername" placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>CN（专属标识）</label>
                    <input type="text" id="regCn" placeholder="请输入CN">
                </div>
                <button class="btn-primary" onclick="register()">注册</button>
                <p class="link" onclick="showLogin()">已有账号？去登录</p>
            </div>
        </div>
    </div>

    <div id="homePage" class="page">
        <nav class="navbar">
            <span class="nav-title">Coin_V_Q</span>
            <div class="nav-right">
                <span id="navAdmin" class="nav-link" onclick="showAdmin()" style="display:none">管理</span>
                <span class="nav-link" onclick="showLeaderboard()">排行榜</span>
                <span class="nav-link" onclick="showProfile()">我的</span>
                <span class="nav-link" onclick="switchAccount()">切换</span>
            </div>
        </nav>
        <div class="user-card" id="userCard">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div>
                    <div class="user-name" id="userName">未设置</div>
                    <div class="user-cn" id="userCn">CN: 未设置</div>
                </div>
            </div>
            <div class="user-coins">
                <div><span class="coins-value" id="userCoins">0</span> <span class="coins-label">币</span></div>
                <div style="font-size:12px;opacity:0.8">待结算: <span id="pendingCoins">0</span></div>
            </div>
        </div>
        <div class="section-title" style="padding:10px 20px;font-size:13px;color:#666;line-height:1.8">
            <strong style="color:#333">竞猜规则：</strong>封盘前可随时投币/改币（覆盖），设为0即取消。结算公式：投币数 × 基础倍率 × (总币池 / 正确选项币池)。重置则全额退回。<span style="color:#667eea;cursor:pointer" onclick="showRules()">详细规则</span>
        </div>
        <div class="section-title">进行中的比赛</div>
        <div id="competitionList"></div>
    </div>

    <div id="matchPage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBack()">← 返回</span>
            <span class="nav-title" id="matchTitle">比赛详情</span>
            <span></span>
        </nav>
        <div id="filterArea"></div>
        <div id="questionList"></div>
    </div>

    <div id="betPage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBackFromBet()">← 返回</span>
            <span class="nav-title">投注</span>
            <span></span>
        </nav>
        <div class="question-header" id="betQuestionHeader">
            <div class="question-code" id="betQuestionCode"></div>
            <div class="question-text" id="betQuestionText"></div>
        </div>
        <div class="section-title">选择选项并投币</div>
        <div id="optionList"></div>
        <div class="bet-balance">当前余额: <span id="betBalance">0</span> 币</div>
    </div>

    <div id="leaderboardPage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBack()">← 返回</span>
            <span class="nav-title">排行榜</span>
            <span></span>
        </nav>
        <div id="leaderboardList"></div>
    </div>

    <div id="profilePage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBack()">← 返回</span>
            <span class="nav-title">个人中心</span>
            <span></span>
        </nav>
        <div class="profile-card" onclick="uploadAvatar()" style="cursor:pointer">
            <div class="profile-avatar" id="profileAvatar">?</div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">未设置</div>
                <div class="profile-cn">CN: <span id="profileCn">未设置</span></div>
                <div style="font-size:12px;opacity:0.7;margin-top:4px">点击修改头像</div>
            </div>
            <div class="profile-coins">
                <span class="coins-value" id="profileCoins">0</span>
                <span class="coins-label">币</span>
            </div>
        </div>
        <div class="section-title">编辑资料</div>
        <div class="edit-form">
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="editNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>CN</label>
                <input type="text" id="editCn" placeholder="请输入CN">
            </div>
            <button class="btn-primary" onclick="saveProfile()">保存</button>
        </div>
        <div class="section-title">修改密码</div>
        <div class="edit-form">
            <div class="form-group">
                <label>原密码</label>
                <input type="password" id="oldPassword" placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
            </div>
            <button class="btn-primary" onclick="changePassword()">修改密码</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBack()">← 返回</span>
            <span class="nav-title">管理后台</span>
            <span></span>
        </nav>
        <div class="admin-tabs">
            <span class="tab active" onclick="switchAdminTab('stats', event)">统计</span>
            <span class="tab" onclick="switchAdminTab('users', event)">用户</span>
            <span class="tab" onclick="switchAdminTab('teams', event)">队伍</span>
            <span class="tab" onclick="switchAdminTab('matches', event)">赛程</span>
            <span class="tab" onclick="switchAdminTab('questions', event)">问题</span>
        </div>
        <div id="adminContent"></div>
    </div>

    <div id="rulesPage" class="page">
        <nav class="navbar">
            <span class="back-btn" onclick="goBack()">← 返回</span>
            <span class="nav-title">规则说明</span>
            <span></span>
        </nav>
        <div id="rulesContent"></div>
    </div>

    <script src="js/xlsx.full.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
